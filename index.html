<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>كتالوج المنتجات - احترافي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    /* --- نفس الـ CSS الخاص بك مع بعض التعديلات الطفيفة --- */
    :root {
      --green-dark: #1a4a2e;
      --green-mid: #2d6a4f;
      --green-light: #40916c;
      --gold: #d4a017;
      --gold-light: #f0c040;
      --bg: #f8f5ef;
      --white: #ffffff;
      --card-border: #2d6a4f;
      --text-dark: #1a1a1a;
      --badge-bg: #1a4a2e;
      --badge-num: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .poster {
      width: 900px;
      max-width: 100%;
      background: var(--white);
      border: 6px solid var(--green-dark);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    }

    /* ===== HEADER ===== */
    .header {
      background: linear-gradient(135deg, var(--green-dark) 60%, var(--green-mid));
      padding: 18px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .logo-box {
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.12);
      border: 2px dashed rgba(255,255,255,0.5);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .2s;
      position: relative;
      overflow: hidden;
    }
    .logo-box:hover { background: rgba(255,255,255,0.2); }
    .logo-box img { width: 100%; height: 100%; object-fit: contain; display: none; border-radius: 10px; }
    .logo-box .placeholder { font-size: 11px; color: rgba(255,255,255,0.7); text-align: center; line-height: 1.4; }
    .logo-box input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    .header-title {
      text-align: center;
      flex: 1;
    }
    .header-title .available {
      font-size: 30px;
      font-weight: 900;
      color: var(--gold-light);
      letter-spacing: 1px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .header-title .subtitle {
      font-size: 15px;
      color: rgba(255,255,255,0.88);
      margin-top: 2px;
    }

    .qr-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .qr-box {
      width: 80px;
      height: 80px;
      background: var(--white);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.3);
    }
    .qr-box img { width: 100%; height: 100%; object-fit: contain; display: none; }
    .qr-box .placeholder { font-size: 10px; color: var(--green-dark); text-align: center; line-height: 1.4; }
    .qr-box input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .qr-label { font-size: 10px; color: rgba(255,255,255,0.7); }

    /* ===== GRID ===== */
    .grid-section {
      padding: 20px;
      background: var(--bg);
    }

    /* تحسين مهم: شبكة واحدة متسقة */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    /* المنتج (البطاقة) */
    .product-card {
      background: var(--white);
      border: 2.5px solid var(--card-border);
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
    }
    .product-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(26,74,46,0.15); }

    .badge {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      background: var(--badge-bg);
      color: var(--badge-num);
      border-radius: 50%;
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .product-card img.product-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 10px;
      display: none;
    }

    .add-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--green-mid);
      font-size: 13px;
      text-align: center;
      pointer-events: none;
    }
    .add-placeholder .plus {
      font-size: 32px;
      font-weight: 300;
      line-height: 1;
      color: var(--green-light);
    }

    .product-card input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      z-index: 2;
    }

    .remove-btn {
      position: absolute;
      top: 8px;
      left: 8px;
      width: 22px;
      height: 22px;
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 4;
    }

    /* البانر الأوسط (الخاص بالصف الثاني والثالث) */
    .middle-banner {
      background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 10px;
      text-align: center;
      border: 2.5px solid var(--green-dark);
      aspect-ratio: 4/3; /* لجعله بنفس حجم المنتجات */
    }
    .middle-banner .megaphone { font-size: 28px; margin-bottom: 8px; }
    .middle-banner .title-ar { font-size: 20px; font-weight: 900; color: var(--gold-light); line-height: 1.2; }
    .middle-banner .title-en { font-size: 18px; font-weight: 900; color: var(--white); }
    .middle-banner .desc { font-size: 12px; color: rgba(255,255,255,0.85); margin-top: 6px; line-height: 1.5; }

    /* ===== FOOTER ===== */
    .footer {
      background: linear-gradient(135deg, var(--green-dark) 60%, var(--green-mid));
      padding: 14px 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .footer-text {
      text-align: center;
    }
    .footer-text .discover-ar { font-size: 17px; font-weight: 700; color: var(--gold-light); }
    .footer-text .discover-en { font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.9); }

    .link-box {
      background: var(--white);
      border-radius: 30px;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 260px;
    }
    .link-box .wa-icon { font-size: 22px; }
    .link-box input[type="text"] {
      border: none;
      outline: none;
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      color: var(--text-dark);
      width: 100%;
      text-align: right;
      background: transparent;
    }
    .link-box input::placeholder { color: #999; }

    /* ===== PRINT BUTTON ===== */
    .controls {
      text-align: center;
      padding: 16px;
      background: var(--bg);
    }
    .btn-print {
      background: var(--green-dark);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 30px;
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-print:hover { background: var(--green-mid); }

    @media print {
  body { 
    padding: 0; 
    background: white !important; 
    -webkit-print-color-adjust: exact; /* مهم جداً لكروم وإيدج */
    print-color-adjust: exact;         /* للمتصفحات الأخرى */
  }
  .controls { display: none !important; }
  .poster { 
    box-shadow: none; 
    border-radius: 0; 
    width: 100%; 
    border: 6px solid #1a4a2e !important; /* التأكد من ظهور الإطار */
  }
  .product-card {
    border: 2px solid #2d6a4f !important;
    -webkit-print-color-adjust: exact;
  }
  /* التأكد من ظهور خلفيات الهيدر والبانرات */
  .header, .middle-banner, .footer {
    background: linear-gradient(135deg, #1a4a2e 60%, #2d6a4f) !important;
    -webkit-print-color-adjust: exact;
  }
}

  </style>
</head>
<body>

<div>
  <div class="poster" id="poster">

    <!-- HEADER (نفس الهيكل) -->
    <div class="header">
      <div class="logo-area">
        <div class="logo-box" id="logoBox" title="اضغط لإضافة اللوجو">
          <img id="logoImg" src="" alt="Logo"/>
          <span class="placeholder">🏷️<br/>أضف اللوجو</span>
          <input type="file" accept="image/*" id="logoInput"/>
        </div>
        <div style="color:rgba(255,255,255,0.6); font-size:11px; text-align:center; line-height:1.6;">
          ركن الخليج<br/>العربي
        </div>
      </div>

      <div class="header-title">
        <div class="available">📢 متوفر الآن! | Available!</div>
        <div class="subtitle">اسعار مميزة تجدها عندنا.</div>
      </div>

      <div class="qr-area">
        <div class="qr-box" id="qrBox" title="اضغط لإضافة QR Code">
          <img id="qrImg" src="" alt="QR"/>
          <span class="placeholder">QR<br/>Code</span>
          <input type="file" accept="image/*" id="qrInput"/>
        </div>
        <span class="qr-label">Scan QR Code</span>
      </div>
    </div>

    <!-- GRID: شبكة واحدة فقط تحتوي على كل العناصر (منتجات + بانرات) -->
    <div class="grid-section">
      <div class="products-grid" id="productsGrid">
        <!-- سندمج هنا المنتجات مع البانرات المحددة -->
        <!-- سيتم إنشاؤها بواسطة JavaScript لضمان المرونة وحفظ البيانات -->
      </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      <div class="footer-text">
        <div class="discover-ar">اكتشف المزيد</div>
        <div class="discover-en">Discover More</div>
      </div>
      <div class="link-box">
        <span class="wa-icon">💬</span>
        <input type="text" id="catalogLink" placeholder="أدخل رابط الكتالوج هنا..." dir="rtl"/>
      </div>
    </div>

  </div>

  <div class="controls">
    <button class="btn-print" onclick="window.print()">🖨️ طباعة / تصدير PDF</button>
  </div>
</div>

<script>
  // --- بيانات المنتجات (لتسهيل الإدارة والحفظ)
  // تعريف هيكل الجريد: إما "product" أو "banner"
  const gridStructure = [
    { type: 'product', id: 0, badge: 1 },
    { type: 'banner', variant: 'main' }, // البانر الأول (متوفر الآن)
    { type: 'product', id: 1, badge: 2 },
    { type: 'product', id: 2, badge: 3 },
    { type: 'product', id: 3, badge: 4 },
    { type: 'product', id: 4, badge: 5 },
    { type: 'product', id: 5, badge: 6 },
    { type: 'banner', variant: 'discover' }, // البانر الثاني (اكتشف المزيد)
    { type: 'product', id: 6, badge: 7 }
  ];

  // مصفوفة لتخزين الصور (Object URLs) لتجنب التسريب
  let productImages = new Array(7).fill(null);
  let logoURL = null;
  let qrURL = null;

  // دالة لتحرير الذاكرة (Object URLs)
  function revokeImage(url) {
    if (url && url.startsWith('blob:')) {
      URL.revokeObjectURL(url);
    }
  }

  // دالة لحفظ البيانات في LocalStorage
  function saveToLocalStorage() {
    // لا يمكن حفظ Object URLs، نحتاج لحفظ البيانات الخام (Base64)
    // لهذا سنقوم بتحويل الصور الحالية إلى Base64 عند الحفظ
    // ولكن لتجنب التعقيد سنقوم بجمع الـ Base64 من عناصر img مباشرة
    const productData = [];
    for (let i = 0; i < 7; i++) {
      const img = document.getElementById(`img-${i}`);
      productData.push(img ? img.src : '');
    }
    const logoImg = document.getElementById('logoImg');
    const qrImg = document.getElementById('qrImg');
    const link = document.getElementById('catalogLink').value;
    
    const data = {
      products: productData,
      logo: logoImg ? logoImg.src : '',
      qr: qrImg ? qrImg.src : '',
      link: link
    };
    localStorage.setItem('catalogData', JSON.stringify(data));
  }

  // دالة لتحميل البيانات من LocalStorage
  function loadFromLocalStorage() {
    const saved = localStorage.getItem('catalogData');
    if (!saved) return;
    try {
      const data = JSON.parse(saved);
      // تحميل المنتجات
      for (let i = 0; i < 7 && i < data.products.length; i++) {
        if (data.products[i]) {
          const img = document.getElementById(`img-${i}`);
          if (img) {
            img.src = data.products[i];
            img.style.display = 'block';
            const card = document.getElementById(`card-${i}`);
            if (card) {
              card.querySelector('.add-placeholder').style.display = 'none';
              card.querySelector('.remove-btn').style.display = 'flex';
            }
          }
        }
      }
      // تحميل اللوجو
      if (data.logo) {
        const logoImg = document.getElementById('logoImg');
        logoImg.src = data.logo;
        logoImg.style.display = 'block';
        document.getElementById('logoBox').querySelector('.placeholder').style.display = 'none';
      }
      // تحميل QR
      if (data.qr) {
        const qrImg = document.getElementById('qrImg');
        qrImg.src = data.qr;
        qrImg.style.display = 'block';
        document.getElementById('qrBox').querySelector('.placeholder').style.display = 'none';
      }
      // تحميل الرابط
      if (data.link) {
        document.getElementById('catalogLink').value = data.link;
      }
    } catch(e) { console.error("Error loading data", e); }
  }

  // دالة لإنشاء واجهة المستخدم بناءً على الـ gridStructure
  function renderGrid() {
    const container = document.getElementById('productsGrid');
    container.innerHTML = '';
    gridStructure.forEach(item => {
      if (item.type === 'product') {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.id = `card-${item.id}`;
        card.innerHTML = `
          <span class="badge">${item.badge}</span>
          <button class="remove-btn" onclick="removeImage(${item.id})" title="حذف الصورة">✕</button>
          <img class="product-img" id="img-${item.id}" src="" alt=""/>
          <div class="add-placeholder"><span class="plus">+</span>أضف صورة</div>
          <input type="file" accept="image/*" onchange="loadProduct(event, ${item.id})"/>
        `;
        container.appendChild(card);
      } else if (item.type === 'banner') {
        const banner = document.createElement('div');
        banner.className = 'middle-banner';
        if (item.variant === 'main') {
          banner.innerHTML = `
            <div class="megaphone">📢</div>
            <div class="title-ar">متوفر الآن!</div>
            <div class="title-en">Available!</div>
            <div class="desc">أسعار مميزة<br/>أطلب الآن.</div>
          `;
        } else {
          banner.innerHTML = `
            <div style="font-size:14px; font-weight:700; color:var(--gold-light);">اكتشف المزيد</div>
            <div style="font-size:12px; color:rgba(255,255,255,0.8); margin-top:2px;">Discover More</div>
            <div style="margin-top:10px; background:white; border-radius:20px; padding:6px 14px; display:flex; align-items:center; gap:8px; width:100%; justify-content:center;">
              <span style="font-size:18px;">💬</span>
              <span style="font-size:11px; color:#1a4a2e; font-weight:600;">0560967982</span>
            </div>
          `;
        }
        container.appendChild(banner);
      }
    });
  }

  // --- دوال تحميل الصور (محسنة باستخدام ObjectURL)
  function loadProduct(event, index) {
    const file = event.target.files[0];
    if (!file) return;
    
    // إلغاء الـ URL القديم إن وجد
    if (productImages[index]) revokeImage(productImages[index]);
    
    const url = URL.createObjectURL(file);
    productImages[index] = url;
    
    const img = document.getElementById(`img-${index}`);
    const card = document.getElementById(`card-${index}`);
    img.src = url;
    img.style.display = 'block';
    card.querySelector('.add-placeholder').style.display = 'none';
    card.querySelector('.remove-btn').style.display = 'flex';
    
    saveToLocalStorage();
  }

  function removeImage(index) {
    const img = document.getElementById(`img-${index}`);
    const card = document.getElementById(`card-${index}`);
    if (productImages[index]) {
      revokeImage(productImages[index]);
      productImages[index] = null;
    }
    img.src = '';
    img.style.display = 'none';
    card.querySelector('.add-placeholder').style.display = 'flex';
    card.querySelector('.remove-btn').style.display = 'none';
    // Reset file input
    const input = card.querySelector('input[type="file"]');
    if (input) input.value = '';
    saveToLocalStorage();
  }

  function loadLogoOrQR(event, imgId, boxId) {
    const file = event.target.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    const img = document.getElementById(imgId);
    const box = document.getElementById(boxId);
    
    // حفظ الـ URL السابق وتحريره
    if (imgId === 'logoImg' && logoURL) revokeImage(logoURL);
    if (imgId === 'qrImg' && qrURL) revokeImage(qrURL);
    if (imgId === 'logoImg') logoURL = url;
    if (imgId === 'qrImg') qrURL = url;
    
    img.src = url;
    img.style.display = 'block';
    box.querySelector('.placeholder').style.display = 'none';
    saveToLocalStorage();
  }

  // --- ربط الأحداث وإعداد الصفحة ---
  window.onload = () => {
    renderGrid(); // بناء واجهة المنتجات والبانرات
    
    // ربط أحداث الإدخالات التي تم إنشاؤها ديناميكياً
    document.getElementById('logoInput').addEventListener('change', (e) => loadLogoOrQR(e, 'logoImg', 'logoBox'));
    document.getElementById('qrInput').addEventListener('change', (e) => loadLogoOrQR(e, 'qrImg', 'qrBox'));
    
    // ربط الحفظ عند تغيير الرابط
    document.getElementById('catalogLink').addEventListener('input', saveToLocalStorage);
    
    // تحميل البيانات المحفوظة
    loadFromLocalStorage();
  };
  
  // جعل الدوال عامة للاستخدام في الـ HTML
  window.loadProduct = loadProduct;
  window.removeImage = removeImage;
</script>

</body>
</html>
