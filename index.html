<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عُدّة أخصائي سلامة الغذاء</title>
<meta name="description" content="أدوات مجانية عملية لأخصائيي سلامة الغذاء — تعمل بدون إنترنت">
<meta name="theme-color" content="#0B6E4F">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body data-page-title-i18n="home.heroTitle">
<a class="skip-link" href="#main-content">تخطي إلى المحتوى / Skip to content</a>
<div id="app-header"></div>

<main id="main-content">
  <section class="hero">
    <h1 data-i18n="home.heroTitle"></h1>
    <p data-i18n="home.heroSubtitle"></p>
    <span class="hero-note" data-i18n="home.heroNote"></span>
  </section>

  <section aria-labelledby="tools-heading">
    <h2 id="tools-heading" data-i18n="home.toolsTitle"></h2>
    <div class="tools-grid" id="toolsGrid"></div>
  </section>

  <section class="about-section" aria-labelledby="about-heading">
    <h2 id="about-heading" data-i18n="home.aboutTitle"></h2>
    <p data-i18n="home.aboutText"></p>
    <ul class="about-list">
      <li data-i18n="home.aboutPoint1"></li>
      <li data-i18n="home.aboutPoint2"></li>
      <li data-i18n="home.aboutPoint3"></li>
      <li data-i18n="home.aboutPoint4"></li>
    </ul>
  </section>

  <section class="about-section" aria-labelledby="backup-heading">
    <h2 id="backup-heading" data-i18n="home.backupTitle"></h2>
    <p data-i18n="home.backupDesc"></p>
    <div style="display:flex; gap:0.6rem; flex-wrap:wrap;">
      <button type="button" class="btn btn-secondary btn-sm" id="backupExportBtn" data-i18n="common.backupExport"></button>
      <button type="button" class="btn btn-ghost btn-sm" id="backupImportBtn" data-i18n="common.backupImport"></button>
      <input type="file" id="backupFileInput" accept="application/json" hidden>
    </div>
    <p class="field-error" id="backupMessage" style="display:none; margin-top:0.6rem;"></p>
  </section>
</main>

<div id="app-footer"></div>

<script src="assets/i18n.js"></script>
<script src="assets/app.js"></script>
<script>
  function renderToolsGrid() {
    const grid = document.getElementById("toolsGrid");
    grid.innerHTML = TOOLS_REGISTRY.map((tool) => {
      const name = t(`home.tools.${tool.id}.name`);
      const desc = t(`home.tools.${tool.id}.desc`);
      const soonBadge = tool.available ? "" : `<span class="badge-soon" data-i18n="home.comingSoonBadge"></span>`;
      const tag = tool.available ? "a" : "div";
      const hrefAttr = tool.available ? `href="${tool.href}"` : "";
      const openBtn = tool.available
        ? `<span class="btn btn-primary btn-sm btn-block" data-i18n="home.openTool"></span>`
        : "";
      return `
        <${tag} class="tool-card${tool.available ? "" : " disabled"}" ${hrefAttr} aria-disabled="${!tool.available}">
          ${soonBadge}
          <div class="tool-icon" aria-hidden="true">${tool.icon}</div>
          <h3>${name}</h3>
          <p class="tool-desc">${desc}</p>
          ${openBtn}
        </${tag}>
      `;
    }).join("");
    applyI18n(grid);
  }

  function showBackupMessage(text, isError) {
    const el = document.getElementById("backupMessage");
    el.textContent = text;
    el.style.display = "block";
    el.style.color = isError ? "var(--color-danger)" : "var(--color-primary)";
  }

  function wireBackup() {
    document.getElementById("backupExportBtn").addEventListener("click", exportAllData);
    document.getElementById("backupImportBtn").addEventListener("click", () => {
      document.getElementById("backupFileInput").click();
    });
    document.getElementById("backupFileInput").addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;
      importAllData(file, (success) => {
        showBackupMessage(success ? t("common.backupSuccess") : t("common.backupError"), !success);
        e.target.value = "";
      });
    });
  }

  initApp({ basePath: "" });
  renderToolsGrid();
  wireBackup();
  document.addEventListener("i18n:change", renderToolsGrid);
</script>
</body>
</html>
